apiVersion: v1
kind: ConfigMap
metadata:
  name: workflow-service-config
  namespace: gestor-documental
  labels:
    app: workflow-service
    project: sgd
data:
  NODE_ENV: "development"
  PORT: "3000"

  # PostgreSQL
  DB_HOST: "postgresql.sgd-infra.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "workflow_db"

  # Kafka
  KAFKA_BROKERS: "kafka.sgd-infra.svc.cluster.local:9092"
  KAFKA_GROUP_ID: "workflow-service-group"
  KAFKA_CLIENT_ID: "workflow-service"

  HEALTH_PATH: "/health"

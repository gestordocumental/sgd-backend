apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: gestor-documental
  labels:
    app: notification-service
    project: sgd
    version: "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
        project: sgd
        version: "1.0.0"
    spec:
      containers:
        - name: notification-service
          image: notification-service:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: notification-service-config
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: notification-service-secret
                  key: REDIS_PASSWORD
            - name: SMTP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: notification-service-secret
                  key: SMTP_USERNAME
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: notification-service-secret
                  key: SMTP_PASSWORD
          startupProbe:
            httpGet:
              path: /health/startup
              port: 3000
            failureThreshold: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/live
              port: 3000
            initialDelaySeconds: 0
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3000
            initialDelaySeconds: 0
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 3
          resources:
            requests:
              cpu: "50m"
              memory: "96Mi"
            limits:
              cpu: "200m"
              memory: "192Mi"
      restartPolicy: Always

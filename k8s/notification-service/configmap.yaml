apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-service-config
  namespace: gestor-documental
  labels:
    app: notification-service
    project: sgd
data:
  NODE_ENV: "development"
  PORT: "3000"

  # Redis (cola de notificaciones pendientes)
  REDIS_HOST: "redis-master.sgd-infra.svc.cluster.local"
  REDIS_PORT: "6379"

  # Kafka
  KAFKA_BROKERS: "kafka.sgd-infra.svc.cluster.local:9092"
  KAFKA_GROUP_ID: "notification-service-group"
  KAFKA_CLIENT_ID: "notification-service"

  # Email
  SMTP_HOST: "smtp.sendgrid.net"
  SMTP_PORT: "587"
  EMAIL_FROM: "sgd-noreply@helisa.com"

  HEALTH_PATH: "/health"

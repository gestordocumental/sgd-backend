apiVersion: v1
kind: Secret
metadata:
  name: auth-service-secret
  namespace: gestor-documental
  labels:
    app: auth-service
    project: sgd
type: Opaque
# IMPORTANTE: En local usar estos valores base64.
# Producción: reemplazar con un gestor de secretos (Vault / Sealed Secrets).
# Generar: echo -n "valor" | base64
stringData:
  DB_USERNAME: "auth_user"
  DB_PASSWORD: "auth_pass_local"
  REDIS_PASSWORD: ""
  JWT_SECRET: "sgd-jwt-secret-local-dev-change-in-prod"
  JWT_REFRESH_SECRET: "sgd-refresh-secret-local-dev-change-in-prod"
  INTERNAL_TOKEN: "internal-token-local-dev-change-in-prod"

apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: gestor-documental
  labels:
    app: auth-service
    project: sgd
spec:
  type: ClusterIP          # Solo accesible dentro del cluster (via Kong externamente)
  selector:
    app: auth-service
  ports:
    - name: http
      port: 80             # Puerto que expone el Service dentro del cluster
      targetPort: 3000     # Puerto del contenedor NestJS
      protocol: TCP

apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: gestor-documental
  labels:
    app: user-service
    project: sgd
    version: "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
        project: sgd
        version: "1.0.0"
    spec:
      containers:
        - name: user-service
          image: user-service:1.0.0
          imagePullPolicy: IfNotPresent  # Usa imagen local en KinD
          ports:
            - containerPort: 3000
              name: http

          # Variables no sensibles desde ConfigMap
          envFrom:
            - configMapRef:
                name: user-service-config

          # Variables sensibles desde Secret
          env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: user-service-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: user-service-secret
                  key: DB_PASSWORD
            - name: INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: user-service-secret
                  key: INTERNAL_TOKEN

          # ── Health Probes ─────────────────────────────────────────────────
          # startupProbe: espera hasta 50s a que NestJS arranque completamente
          startupProbe:
            httpGet:
              path: /health/startup
              port: 3000
            failureThreshold: 10   # 10 intentos × 5s = 50s máximo
            periodSeconds: 5

          # livenessProbe: reinicia el pod si el proceso se bloquea
          livenessProbe:
            httpGet:
              path: /health/live
              port: 3000
            initialDelaySeconds: 0
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 3

          # readinessProbe: retira el pod del balanceador si PostgreSQL no responde
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3000
            initialDelaySeconds: 0
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 3

          # ── Recursos ─────────────────────────────────────────────────────
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"

      restartPolicy: Always

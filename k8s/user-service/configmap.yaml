apiVersion: v1
kind: ConfigMap
metadata:
  name: user-service-config
  namespace: gestor-documental
  labels:
    app: user-service
    project: sgd
data:
  NODE_ENV: "development"
  PORT: "3000"

  # PostgreSQL
  DB_HOST: "postgresql.sgd-infra.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "user_db"

  # Internal URL of auth-service within the cluster
  AUTH_SERVICE_URL: "http://auth-service.gestor-documental.svc.cluster.local"

  HEALTH_PATH: "/health"

apiVersion: v1
kind: Secret
metadata:
  name: kong-secret
  namespace: gestor-documental
  labels:
    app: api-gateway
    project: sgd
type: Opaque
# IMPORTANTE: El JWT_SECRET debe coincidir exactamente con el de auth-service-secret.
# En local ambos usan "sgd-jwt-secret-local-dev-change-in-prod".
# En producción: reemplazar con un secreto generado criptográficamente.
stringData:
  KONG_JWT_SECRET: "sgd-jwt-secret-local-dev-change-in-prod"

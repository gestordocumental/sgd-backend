apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-config
  namespace: gestor-documental
  labels:
    app: api-gateway
    project: sgd
data:
  kong.yaml: |
    _format_version: "3.0"
    _transform: true

    # ── Consumidor SGD ─────────────────────────────────────────────────────────
    # Kong necesita un consumer para asociar las credenciales JWT.
    # El auth-service emite tokens firmados con JWT_SECRET; Kong los valida aquí.
    consumers:
      - username: sgd-users
        jwt_secrets:
          - key: sgd-jwt-key
            algorithm: HS256
            secret: "sgd-jwt-secret-local-dev-change-in-prod"

    # ── Plugins globales ───────────────────────────────────────────────────────
    plugins:
      # Generates X-Correlation-ID for every request — enables distributed tracing
      - name: correlation-id
        config:
          header_name: x-correlation-id
          generator: uuid
          echo_downstream: true   # returns the ID in the response header

      - name: rate-limiting
        config:
          minute: 100
          policy: local
          fault_tolerant: true

      - name: cors
        config:
          origins:
            - "http://localhost:3001"    # web-app en local
            - "http://localhost:8080"    # via Kong en local
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Authorization
            - Content-Type
            - Accept
            - X-Company-Id
            - X-Correlation-Id
          exposed_headers:
            - X-Request-Id
            - X-Correlation-Id
          credentials: true
          max_age: 3600

    # ── Servicios y Rutas ──────────────────────────────────────────────────────
    # REGLA: Todo tráfico externo pasa por Kong (sección 6.1 del documento).
    # Las rutas públicas (login, refresh) no requieren JWT.
    # Todas las demás rutas validan el JWT antes de enrutar.

    services:

      # ── auth-service: rutas PÚBLICAS (sin JWT) ─────────────────────────────
      - name: auth-public
        url: http://auth-service.gestor-documental.svc.cluster.local
        routes:
          - name: auth-login
            paths:
              - /api/auth/login
              - /api/auth/register
              - /api/auth/refresh
            methods: [POST]
            strip_path: false

      # ── auth-service: rutas PROTEGIDAS (con JWT) ───────────────────────────
      - name: auth-protected
        url: http://auth-service.gestor-documental.svc.cluster.local
        routes:
          - name: auth-me
            paths:
              - /api/auth
            strip_path: false
        plugins:
          - name: jwt

      # ── org-service ────────────────────────────────────────────────────────
      - name: org-service
        url: http://org-service.gestor-documental.svc.cluster.local
        routes:
          - name: org-routes
            paths:
              - /api/org
            strip_path: false
        plugins:
          - name: jwt

      # ── user-service ───────────────────────────────────────────────────────
      - name: user-service
        url: http://user-service.gestor-documental.svc.cluster.local
        routes:
          - name: user-routes
            paths:
              - /api/users
            strip_path: false
        plugins:
          - name: jwt

      # ── workflow-service ───────────────────────────────────────────────────
      - name: workflow-service
        url: http://workflow-service.gestor-documental.svc.cluster.local
        routes:
          - name: workflow-routes
            paths:
              - /api/workflows
            strip_path: false
        plugins:
          - name: jwt

      # ── document-service ───────────────────────────────────────────────────
      - name: document-service
        url: http://document-service.gestor-documental.svc.cluster.local
        routes:
          - name: document-routes
            paths:
              - /api/documents
            strip_path: false
        plugins:
          - name: jwt

      # ── notification-service ───────────────────────────────────────────────
      - name: notification-service
        url: http://notification-service.gestor-documental.svc.cluster.local
        routes:
          - name: notification-routes
            paths:
              - /api/notifications
            strip_path: false
        plugins:
          - name: jwt

      # ── audit-service ──────────────────────────────────────────────────────
      - name: audit-service
        url: http://audit-service.gestor-documental.svc.cluster.local
        routes:
          - name: audit-routes
            paths:
              - /api/audit
            strip_path: false
        plugins:
          - name: jwt

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: gestor-documental
  labels:
    app: api-gateway
    project: sgd
    version: "3.4"
spec:
  replicas: 1
  # Recreate en lugar de RollingUpdate porque Kong usa hostPorts —
  # dos pods no pueden ocupar el mismo puerto del nodo simultáneamente.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        project: sgd
        version: "3.4"
    spec:
      # ── Afinidad al nodo control-plane de Kind ────────────────────────────
      # El kind-config.yaml marca el control-plane con ingress-ready=true.
      # Kong necesita correr ahí para que los hostPorts del nodo funcionen.
      nodeSelector:
        ingress-ready: "true"
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Equal
          effect: NoSchedule

      containers:
        - name: api-gateway
          image: kong:3.4
          imagePullPolicy: IfNotPresent
          env:
            - name: KONG_DATABASE
              value: "off"                          # Modo DB-less (declarativo)
            - name: KONG_DECLARATIVE_CONFIG
              value: "/etc/kong/kong.yaml"
            - name: KONG_PROXY_LISTEN
              value: "0.0.0.0:8000, 0.0.0.0:8443 ssl"
            - name: KONG_ADMIN_LISTEN
              value: "0.0.0.0:8001"
            - name: KONG_PROXY_ACCESS_LOG
              value: "/dev/stdout"
            - name: KONG_PROXY_ERROR_LOG
              value: "/dev/stderr"
            - name: KONG_ADMIN_ACCESS_LOG
              value: "/dev/stdout"
            - name: KONG_ADMIN_ERROR_LOG
              value: "/dev/stderr"
            - name: KONG_NGINX_WORKER_PROCESSES
              value: "1"           # Reduce consumo de RAM en local (default: auto = 1 por CPU)
          ports:
            # hostPort enlaza directamente al puerto del nodo Kind,
            # que a su vez está mapeado al hostPort del host (kind-config.yaml).
            - containerPort: 8000
              hostPort: 80           # localhost:8080 → nodo:80 → Kong:8000
              name: proxy-http
            - containerPort: 8443
              hostPort: 443          # localhost:8443 → nodo:443 → Kong:8443
              name: proxy-https
            - containerPort: 8001
              hostPort: 8001         # localhost:8001 → nodo:8001 → Kong:8001
              name: admin-http
          volumeMounts:
            - name: kong-config-volume
              mountPath: /etc/kong
              readOnly: true
          # ── Health Probes ─────────────────────────────────────────────────
          # Kong expone /status en el puerto admin para su estado de salud.
          startupProbe:
            httpGet:
              path: /status
              port: 8001
            failureThreshold: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /status
              port: 8001
            initialDelaySeconds: 0
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /status
              port: 8001
            initialDelaySeconds: 0
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 3
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
      volumes:
        - name: kong-config-volume
          configMap:
            name: kong-config
            items:
              - key: kong.yaml
                path: kong.yaml
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: sgd-infra
  labels:
    project: sgd
    type: external
spec:
  type: ExternalName
  # Los pods alcanzan Kafka por el puerto EXTERNAL (9094)
  externalName: host.docker.internal
  ports:
    - port: 9092
      targetPort: 9094


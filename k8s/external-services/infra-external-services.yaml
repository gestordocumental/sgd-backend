# Servicios + Endpoints — Puente entre pods en Kind y servicios en docker-compose.
#
# Usa Endpoints con IP directa en lugar de ExternalName para evitar problemas
# de resolución de host.docker.internal en nodos Kind donde no está en /etc/hosts.
#
# La IP 172.21.0.1 es el gateway de la red Docker donde corren los nodos Kind
# (la red sgd-local). Esta IP apunta al host Windows/Mac donde corre docker-compose.
#
# Si la red Kind cambia, busca el gateway con:
#   docker network inspect sgd-local -f '{{(index .IPAM.Config 0).Gateway}}'
#
# Aplicar: kubectl apply -f k8s/external-services/

---
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: sgd-infra
  labels:
    project: sgd
    type: external
spec:
  ports:
    - port: 5432
      targetPort: 5432

---
apiVersion: v1
kind: Endpoints
metadata:
  name: postgresql
  namespace: sgd-infra
subsets:
  - addresses:
      - ip: 172.21.0.1
    ports:
      - port: 5432


# Infraestructura local del SGD.
# Levanta todas las dependencias de datos: DBs, Kafka, Redis, MinIO, Elasticsearch.
#
# Flujo de trabajo local:
#   1. docker compose up -d                    → levanta infraestructura
#   2. cd services/<nombre> && npm run start:dev  → arranca cada microservicio

name: sgd-infra

services:

  # ─────────────────────────────────────────────────────────────────────────────
  # PostgreSQL — Auth, Org, User, Workflow, Notification services
  # ─────────────────────────────────────────────────────────────────────────────
  postgresql:
    image: postgres:15-alpine
    container_name: sgd-postgresql
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_local
      POSTGRES_DB: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - sgd-local

  # ─────────────────────────────────────────────────────────────────────────────
  # MongoDB — Document Service
  # ─────────────────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: sgd-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo_admin
      MONGO_INITDB_ROOT_PASSWORD: mongo_pass_local
      MONGO_INITDB_DATABASE: document_db
    volumes:
      - mongodata:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - sgd-local

  # ─────────────────────────────────────────────────────────────────────────────
  # Redis — Auth Service (JWT/refresh tokens) · User Service (invitation tokens)
  #         Notification Service (SSE tickets efímeros, 30 s TTL)
  # Autenticación habilitada con contraseña local. En producción (Railway) usar
  # la variable REDIS_PASSWORD del plugin Redis — nunca dejar sin contraseña.
  # ─────────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: sgd-redis
    command: redis-server --save 60 1 --loglevel warning --requirepass redis_local_pass
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a redis_local_pass --no-auth-warning ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - sgd-local

  # ─────────────────────────────────────────────────────────────────────────────
  # Kafka — Comunicación asíncrona entre servicios (sección 3.2)
  # Imagen: apache/kafka (bitnami/kafka fue descontinuado en Docker Hub)
  # Modo KRaft: sin Zookeeper
  # ─────────────────────────────────────────────────────────────────────────────
  kafka:
    image: apache/kafka:latest
    container_name: sgd-kafka
    environment:
      # KRaft (sin Zookeeper) — apache/kafka usa KAFKA_ sin prefijo CFG_
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # PLAINTEXT: comunicación interna docker-compose
      # HOST: acceso desde herramientas que corren directamente en el host
      # KIND: acceso desde nodos Kind u otros clientes containerizados
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,HOST://:9094,KIND://:9095
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,HOST://127.0.0.1:9094,KIND://${KAFKA_KIND_ADVERTISED_HOST:-host.docker.internal}:9095
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,HOST:PLAINTEXT,KIND:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafkadata:/var/lib/kafka/data
    ports:
      - "9094:9094"     # Host local: localhost:9094
      - "9095:9095"     # Kind/contenedores: ${KAFKA_KIND_ADVERTISED_HOST:-host.docker.internal}:9095
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9092'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped
    networks:
      - sgd-local

  # ─────────────────────────────────────────────────────────────────────────────
  # Kafka Init — Crea los tópicos necesarios al arrancar (se ejecuta una vez)
  # ─────────────────────────────────────────────────────────────────────────────
  kafka-init:
    image: apache/kafka:latest
    container_name: sgd-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    # Cada kafka-topics.sh en UNA sola línea: el YAML '>' preserva newlines
    # para líneas con mayor indentación, lo que rompe los argumentos del comando.
    command: >
      /bin/bash -c "
      echo '>>> Creando tópicos SGD...' &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic service.health.event --partitions 1 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic document.created --partitions 3 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic document.approved --partitions 3 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic document.rejected --partitions 3 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic workflow.step.completed --partitions 3 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic user.invited --partitions 1 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic notification.send --partitions 2 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic audit.log --partitions 3 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic workflow.created --partitions 3 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic workflow.cancelled --partitions 3 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic workflow.approval.started --partitions 3 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic workflow.approval.rejected --partitions 3 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic workflow.approval.approved --partitions 3 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic workflow.approval.completed --partitions 3 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic workflow.returned.to.creator --partitions 3 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic workflow.resubmitted --partitions 3 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic workflow.available.for.final.users --partitions 3 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic workflow.admin.cycle.started --partitions 3 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic workflow.admin.cycle.step.completed --partitions 3 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic workflow.admin.cycle.completed --partitions 3 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic workflow.closed --partitions 3 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic typology.file.uploaded --partitions 3 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic typology.metadata.extracted --partitions 3 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic typology.metadata.extraction.failed --partitions 3 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic user.org-removed --partitions 1 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic user.super-admin-revoked --partitions 1 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic auth.password-reset --partitions 1 --replication-factor 1 &&
      echo '>>> Tópicos creados correctamente.' &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list
      "
    restart: "no"
    networks:
      - sgd-local

  # ─────────────────────────────────────────────────────────────────────────────
  # Kafka UI — Panel visual de tópicos, consumer groups y lag (sección 5.3)
  # Acceso: http://localhost:8090
  # ─────────────────────────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: sgd-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: sgd-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8090:8080"
    restart: unless-stopped
    networks:
      - sgd-local

  # ─────────────────────────────────────────────────────────────────────────────
  # MinIO — Object storage para PDFs (equivalente local a AWS S3, sección 4.1)
  # API S3:      http://localhost:9000
  # Consola web: http://localhost:9001  (admin / minio_secret_local)
  # ─────────────────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: sgd-minio
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_secret_local
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - sgd-local

  # ─────────────────────────────────────────────────────────────────────────────
  # MinIO Init — Crea los buckets al arrancar (se ejecuta una vez)
  #   · documentos  → privado  (documentos de empresa, acceso por URL firmada)
  #   · avatares    → público  (fotos de perfil, acceso directo sin firma)
  # ─────────────────────────────────────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: sgd-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minio_admin minio_secret_local &&
        mc mb local/documentos --ignore-existing &&
        mc anonymous set none local/documentos &&
        mc mb local/avatares --ignore-existing &&
        mc anonymous set download local/avatares &&
        echo '>>> Buckets documentos (privado) y avatares (público) listos.'
      "
    restart: "no"
    networks:
      - sgd-local

  # ─────────────────────────────────────────────────────────────────────────────
  # Kong — API Gateway local (DB-less, misma config que Railway)
  # Proxy:      http://localhost:8000  ← todos los endpoints pasan por aquí
  # Admin API:  http://localhost:8101  ← diagnóstico (routes, plugins activos)
  #
  # Requiere que los microservicios estén corriendo con npm run start:dev.
  # Kong los alcanza vía host.docker.internal.
  # KONG_JWT_SECRET debe coincidir con JWT_SECRET del auth-service (.env).
  # ─────────────────────────────────────────────────────────────────────────────
  kong:
    image: kong:3.4
    container_name: sgd-kong
    # envsubst sustituye variables de entorno en el template antes de que Kong lo cargue.
    # _transform: true en el YAML de Kong NO hace sustitución de variables de entorno.
    entrypoint: ["/bin/sh", "/kong-entrypoint.sh", "kong", "docker-start"]
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yaml   # sobreescrito por el entrypoint
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_JWT_SECRET: "${KONG_JWT_SECRET:-local-jwt-secret-change-me}"
      # KONG_CONFIG_TEMPLATE y KONG_CORS_ORIGIN_* solo son necesarios en producción;
      # en dev local los orígenes CORS están hardcodeados en kong.local.yaml.
    volumes:
      - ./docker/kong/kong.local.yaml:/etc/kong/kong.template.yaml:ro
      - ./docker/kong/entrypoint.sh:/kong-entrypoint.sh:ro
    ports:
      - "8000:8000"   # Proxy — punto de entrada a todos los microservicios
      - "127.0.0.1:8101:8001"   # Admin API solo local
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Linux: resuelve al host; Mac/Win ya lo tienen
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - sgd-local

  # ─────────────────────────────────────────────────────────────────────────────
  # Elasticsearch — Audit Service (sección 5.3)
  # Nodo único para local. Acceso: http://elastic:elastic_local_pass@localhost:9200
  # Seguridad habilitada con basic auth; TLS deshabilitado para simplificar local.
  # En producción (Railway) usar el plugin ES con TLS nativo habilitado.
  # ─────────────────────────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: sgd-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false       # HTTP plano para local; TLS en prod
      - xpack.security.transport.ssl.enabled=false  # Nodo único — sin inter-nodo TLS
      - ELASTIC_PASSWORD=elastic_local_pass
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=sgd-local
    volumes:
      - esdata:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u elastic:elastic_local_pass http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - sgd-local

  # ── Jaeger — Distributed tracing (all-in-one para dev local) ──────────────
  # UI:            http://localhost:16686
  # OTLP HTTP:     http://localhost:4318  ← apuntado por OTEL_EXPORTER_OTLP_ENDPOINT
  jaeger:
    image: jaegertracing/all-in-one:1.58
    container_name: sgd-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"   # Jaeger UI
      - "4318:4318"     # OTLP HTTP receiver (microservicios del host envían aquí)
    restart: unless-stopped
    networks:
      - sgd-local

# ─────────────────────────────────────────────────────────────────────────────
# Volúmenes persistentes
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  pgdata:
  mongodata:
  redisdata:
  kafkadata:
  miniodata:
  esdata:

# ─────────────────────────────────────────────────────────────────────────────
# Red interna para comunicación entre servicios de infraestructura
# ─────────────────────────────────────────────────────────────────────────────
networks:
  sgd-local:
    driver: bridge

_format_version: "3.0"
_transform: true

# ── Consumidor SGD ──────────────────────────────────────────────────────────
# KONG_JWT_SECRET se inyecta como variable de entorno en Railway.
# Debe coincidir con JWT_SECRET de auth-service.
consumers:
  - username: sgd-users
    jwt_secrets:
      - key: sgd-jwt-key
        algorithm: HS256
        secret: "${KONG_JWT_SECRET}"

# ── Plugins globales ────────────────────────────────────────────────────────
plugins:
  - name: rate-limiting
    config:
      minute: 100
      policy: local
      fault_tolerant: true

  - name: cors
    config:
      origins:
        - "${FRONTEND_URL}" # URL del frontend en Railway o dominio propio
      methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
      headers: [Authorization, Content-Type, Accept, X-Company-Id, X-Correlation-Id]
      exposed_headers: [X-Request-Id, X-Correlation-Id]
      credentials: true
      max_age: 3600

# ── Servicios y Rutas ───────────────────────────────────────────────────────
# En Railway la comunicación interna usa:
#   http://<nombre-del-servicio>.railway.internal:PUERTO
# El PORT de cada microservicio es 3000 (definido en su Dockerfile/env var).

services:
  # ── Health check para Railway ───────────────────────────────────────────
  # Railway hace GET /health para verificar que Kong está vivo.
  # request-termination responde 200 sin llegar a ningún upstream.
  - name: health-service
    url: http://127.0.0.1:8001
    routes:
      - name: health-route
        paths:
          - /health
        methods: [GET]
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 1000000
              policy: local
              fault_tolerant: true
    plugins:
      - name: request-termination
        config:
          status_code: 200
          message: "OK"

  # ── auth-service: rutas PÚBLICAS (sin JWT) ─────────────────────────────
  - name: auth-public
    url: http://auth-service.railway.internal:3000
    routes:
      - name: auth-login
        paths:
          - /api/auth/login
          - /api/auth/refresh
        methods: [POST]
        strip_path: false

  # ── auth-service: provision (token interno, sin JWT público) ──────────
  - name: auth-provision
    url: http://auth-service.railway.internal:3000
    routes:
      - name: auth-provision-route
        paths:
          - /api/auth/credentials/provision
        methods: [POST]
        strip_path: false

  # ── auth-service: rutas PROTEGIDAS (con JWT) ───────────────────────────
  - name: auth-protected
    url: http://auth-service.railway.internal:3000
    routes:
      - name: auth-me
        paths:
          - /api/auth
        strip_path: false
    plugins:
      - name: jwt

  # ── org-service ────────────────────────────────────────────────────────
  - name: org-service
    url: http://org-service.railway.internal:3000
    routes:
      - name: org-routes
        paths:
          - /api/org
        strip_path: false
    plugins:
      - name: jwt

  # ── user-service: rutas PÚBLICAS (sin JWT) ─────────────────────────────
  - name: user-service-public
    url: http://user-service.railway.internal:3000
    routes:
      - name: complete-registration
        paths:
          - /api/users/complete-registration
        methods: [POST]
        strip_path: false
    # Sin plugin jwt — ruta pública

  # ── user-service ───────────────────────────────────────────────────────
  - name: user-service
    url: http://user-service.railway.internal:3000
    routes:
      - name: user-routes
        paths:
          - /api/users
          - /api/roles
          # Exact match: exposes GET /api/permissions (list) but NOT /api/permissions/check,
          # which is internal-only (x-internal-token, service-to-service, never via Kong).
          - ~^/api/permissions$
        strip_path: false
    plugins:
      - name: jwt

  # ── workflow-service ───────────────────────────────────────────────────
  - name: workflow-service
    url: http://workflow-service.railway.internal:3000
    routes:
      - name: workflow-routes
        paths:
          - /api/workflows
        strip_path: false
    plugins:
      - name: jwt

  # ── document-service ───────────────────────────────────────────────────
  - name: document-service
    url: http://document-service.railway.internal:3000
    routes:
      - name: document-routes
        paths:
          - /api/documents
        strip_path: false
    plugins:
      - name: jwt

  # ── notification-service ───────────────────────────────────────────────
  - name: notification-service
    url: http://notification-service.railway.internal:3000
    routes:
      - name: notification-routes
        paths:
          - /api/notifications
        strip_path: false
    plugins:
      - name: jwt

  # ── audit-service ──────────────────────────────────────────────────────
  - name: audit-service
    url: http://audit-service.railway.internal:3000
    routes:
      - name: audit-routes
        paths:
          - /api/audit
        strip_path: false
    plugins:
      - name: jwt

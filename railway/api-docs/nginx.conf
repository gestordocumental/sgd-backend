server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Basic auth — protects all docs
    auth_basic           "SGD API Documentation";
    auth_basic_user_file /tmp/.htpasswd;

    # Each service has its own page
    location / {
        try_files $uri $uri/ =404;
    }

    # Health check endpoint — without auth so Railway can probe it
    location = /health {
        auth_basic off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}

# Default values for any SGD microservice.
# Override per-service with helm/values/{service}-values.yaml.

replicaCount: 1

# Registry compartido por todos los servicios.
# Sobreescribir una vez en CI/CD: --set imageRegistry=ghcr.io/real-org
# o en el values file del entorno: imageRegistry: ghcr.io/real-org
imageRegistry: ghcr.io/your-org

image:
  repository: ""       # nombre del servicio, e.g. "auth-service" (sin registry prefix)
  tag: ""              # override at deploy time: --set image.tag=sha-$(git rev-parse --short HEAD)
  pullPolicy: IfNotPresent

# Credenciales para registros privados (e.g. ghcr.io).
# Ejemplo: imagePullSecrets: [{ name: ghcr-pull-secret }]
imagePullSecrets: []

service:
  type: ClusterIP
  port: 3000

containerPort: 3000

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

# ── Probes ─────────────────────────────────────────────────────────────────────
#
# All three endpoints are exposed by every NestJS service via @nestjs/terminus:
#   /health/startup  → 200 once the server is listening (after migrations ran)
#   /health/live     → always 200 (event loop is running)
#   /health/ready    → 200/503    (DB / Redis / Kafka connectivity)
#
# startupProbe runs first and gates the other two probes.
# During TypeORM migrations the HTTP server has not started yet, so the probe
# returns a connection-refused failure — not a non-200 response.
# failureThreshold gives the pod time for migrations to finish before
# Kubernetes considers it permanently failed and restarts it.

startupProbe:
  httpGet:
    path: /health/startup
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 60   # 60 × 5 s = 300 s max before pod is killed (migration window)
  successThreshold: 1    # services without migrations should override with a lower value
  timeoutSeconds: 3

# livenessProbe kicks in only after startupProbe succeeds.
# Restarts the pod if the event loop becomes completely unresponsive.
livenessProbe:
  httpGet:
    path: /health/live
    port: http
  periodSeconds: 15
  failureThreshold: 3    # restart after 45 s of consecutive failures
  successThreshold: 1
  timeoutSeconds: 5

# readinessProbe checks real dependencies (DB, Redis, Kafka).
# A failing pod is removed from the Service endpoints until deps recover.
readinessProbe:
  httpGet:
    path: /health/ready
    port: http
  periodSeconds: 10
  failureThreshold: 3    # remove from load-balancing after 30 s
  successThreshold: 1
  timeoutSeconds: 5

env: []
# Extra envFrom sources beyond the standard {fullname}-secret / {fullname}-config pair
# generated by the deployment template. Use this to mount additional Secrets or ConfigMaps.
envFrom: []

podAnnotations: {}

# ── Security ────────────────────────────────────────────────────────────────────
# Pod-level security context — applies to all containers in the pod.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

# Container-level security context.
# readOnlyRootFilesystem is false by default: NestJS services may write to /tmp
# (multer uploads, pino log buffering). Set to true per-service if confirmed safe.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

nodeSelector: {}
tolerations: []
affinity: {}

# Chart: helm/charts/sgd-service
# Instalación:
#   helm install workflow-service helm/charts/sgd-service \
#     --namespace gestor-documental \
#     --values helm/values/workflow-service-values.yaml

image:
  repository: workflow-service
  tag: ""           # override at deploy time: --set image.tag=sha-$(git rev-parse --short HEAD)
  pullPolicy: IfNotPresent

# readinessProbe checks: PostgreSQL
readinessProbe:
  httpGet:
    path: /health/ready
    port: http
  periodSeconds: 10
  failureThreshold: 3
  successThreshold: 1
  timeoutSeconds: 5

resources:
  requests:
    cpu: "100m"
    memory: "192Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

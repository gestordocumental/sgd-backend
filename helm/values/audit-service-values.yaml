# Chart: helm/charts/sgd-service
# Instalación:
#   helm install audit-service helm/charts/sgd-service \
#     --namespace gestor-documental \
#     --values helm/values/audit-service-values.yaml

image:
  repository: ghcr.io/your-org/audit-service   # replace with real registry
  tag: "latest"
  pullPolicy: Always

# readinessProbe checks: Elasticsearch + Kafka
# Both can be slower than a DB ping, so timeoutSeconds is raised to 10.
readinessProbe:
  httpGet:
    path: /health/ready
    port: http
  periodSeconds: 10
  failureThreshold: 3
  successThreshold: 1
  timeoutSeconds: 10   # ES + Kafka ping in parallel; allow extra time

resources:
  requests:
    cpu: "100m"
    memory: "192Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

envFrom:
  - secretRef:
      name: audit-service-secret
  - configMapRef:
      name: audit-service-config

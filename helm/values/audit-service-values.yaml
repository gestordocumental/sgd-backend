# Chart: helm/charts/sgd-service
# Instalación:
#   helm install audit-service helm/charts/sgd-service \
#     --namespace gestor-documental \
#     --values helm/values/audit-service-values.yaml

image:
  repository: audit-service
  tag: ""           # override at deploy time: --set image.tag=sha-$(git rev-parse --short HEAD)
  pullPolicy: IfNotPresent

# No TypeORM migrations — reduce the startup window vs. the base default (300 s).
# ES + Kafka connections can take a few seconds but not minutes.
startupProbe:
  httpGet:
    path: /health/startup
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 18   # 90 s — sufficient without migration overhead
  successThreshold: 1
  timeoutSeconds: 3

# readinessProbe checks: Elasticsearch + Kafka
# Both can be slower than a DB ping, so timeoutSeconds is raised to 10.
readinessProbe:
  httpGet:
    path: /health/ready
    port: http
  periodSeconds: 10
  failureThreshold: 3
  successThreshold: 1
  timeoutSeconds: 10   # ES + Kafka ping in parallel; allow extra time

resources:
  requests:
    cpu: "100m"
    memory: "192Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

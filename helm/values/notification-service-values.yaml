# Chart: helm/charts/sgd-service
# Instalación:
#   helm install notification-service helm/charts/sgd-service \
#     --namespace gestor-documental \
#     --values helm/values/notification-service-values.yaml

image:
  repository: notification-service
  tag: ""           # override at deploy time: --set image.tag=sha-$(git rev-parse --short HEAD)
  pullPolicy: IfNotPresent

# 2 TypeORM migrations — small schema additions, no heavy data transforms.
startupProbe:
  httpGet:
    path: /health/startup
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 24   # 120 s — covers fast migrations + PG connection init
  successThreshold: 1
  timeoutSeconds: 3

# readinessProbe checks: PostgreSQL
readinessProbe:
  httpGet:
    path: /health/ready
    port: http
  periodSeconds: 10
  failureThreshold: 3
  successThreshold: 1
  timeoutSeconds: 5

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "300m"
    memory: "256Mi"

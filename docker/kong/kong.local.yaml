_format_version: "3.0"
_transform: true

# ── Consumidor SGD ──────────────────────────────────────────────────────────
# KONG_JWT_SECRET debe coincidir con JWT_SECRET de auth-service (.env)
consumers:
  - username: sgd-users
    jwt_secrets:
      - key: sgd-jwt-key
        algorithm: HS256
        secret: "${KONG_JWT_SECRET}"

# ── Plugins globales ────────────────────────────────────────────────────────
plugins:
  # Capa 1 — por IP
  - name: rate-limiting
    config:
      minute: 10000
      limit_by: ip
      policy: local
      fault_tolerant: true
      hide_client_headers: false

  # Capa 2 — por token JWT (header Authorization)
  - name: rate-limiting
    config:
      minute: 1000
      limit_by: header
      header_name: Authorization
      policy: local
      fault_tolerant: true
      hide_client_headers: false

  - name: cors
    config:
      # Listar orígenes explícitos — el estándar CORS prohíbe credentials: true con origins: "*".
      # En dev local el frontend corre en :5173 (Vite dev) o :4173 (Vite preview).
      origins:
        - "http://localhost:5173"
        - "http://localhost:4173"
      methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
      headers: [Authorization, Content-Type, Accept, X-Company-Id, X-Correlation-Id]
      exposed_headers: [X-Request-Id, X-Correlation-Id]
      credentials: true    # necesario para que el navegador envíe la cookie httpOnly del refresh token
      max_age: 3600

  - name: response-transformer
    config:
      add:
        headers:
          - "X-Content-Type-Options:nosniff"
          - "X-Frame-Options:DENY"
          - "X-XSS-Protection:0"
          - "Referrer-Policy:strict-origin-when-cross-origin"

# ── Servicios y Rutas ───────────────────────────────────────────────────────
# Los microservicios corren en el host con npm run start:dev.
# Kong (Docker) los alcanza via host.docker.internal.
#
#   auth-service      → host.docker.internal:3000
#   user-service      → host.docker.internal:3001
#   org-service       → host.docker.internal:3002
#   document-service  → host.docker.internal:3003
#   metadata-extractor→ host.docker.internal:3004

services:

  # ── Health check de Kong ────────────────────────────────────────────────
  - name: health-service
    url: http://127.0.0.1:8001
    routes:
      - name: health-route
        paths:
          - /health
        methods: [GET]
        strip_path: false
    plugins:
      - name: request-termination
        config:
          status_code: 200
          message: "OK"

  # ── Swagger docs (sin JWT) ──────────────────────────────────────────────
  # Rutas regex (~) tienen mayor prioridad que prefix en Kong,
  # evitando que las rutas con JWT intercepten los assets del Swagger UI.
  - name: auth-docs
    url: http://host.docker.internal:3000
    routes:
      - name: auth-docs-route
        paths:
          - /api/v1/auth/docs
        strip_path: false

  - name: user-docs
    url: http://host.docker.internal:3001
    routes:
      - name: user-docs-route
        paths:
          - /api/v1/users/docs
        strip_path: false

  - name: org-docs
    url: http://host.docker.internal:3002
    routes:
      - name: org-docs-route
        paths:
          - /api/v1/org/docs
        strip_path: false

  - name: document-docs
    url: http://host.docker.internal:3003
    routes:
      - name: document-docs-route
        paths:
          - /api/v1/documents/docs
        strip_path: false

  - name: metadata-extractor-docs
    url: http://host.docker.internal:3004
    routes:
      - name: metadata-extractor-docs-route
        paths:
          - /api/v1/metadata-extractor/docs
        strip_path: false

  # ── auth-service: rutas PÚBLICAS (sin JWT) ─────────────────────────────
  - name: auth-public
    url: http://host.docker.internal:3000
    routes:
      - name: auth-login
        paths:
          - /api/v1/auth/login
          - /api/v1/auth/refresh
          - /api/v1/auth/exit-company
          - /api/v1/auth/forgot-password
        methods: [POST]
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 10
          policy: local
          fault_tolerant: true

  # ── auth-service: reset-password (sin JWT, con rate-limit) ─────────────
  - name: auth-reset-password
    url: http://host.docker.internal:3000
    routes:
      - name: auth-reset-password-route
        paths:
          - /api/v1/auth/reset-password
        methods: [POST]
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 10
          policy: local
          fault_tolerant: true

  # ── auth-service: provision (token interno, sin JWT público) ──────────
  - name: auth-provision
    url: http://host.docker.internal:3000
    routes:
      - name: auth-provision-route
        paths:
          - /api/v1/auth/credentials/provision
        methods: [POST]
        strip_path: false

  # ── auth-service: rutas PROTEGIDAS (con JWT) ───────────────────────────
  - name: auth-protected
    url: http://host.docker.internal:3000
    routes:
      - name: auth-me
        paths:
          - /api/v1/auth
        strip_path: false
    plugins:
      - name: jwt

  # ── org-service ────────────────────────────────────────────────────────
  - name: org-service
    url: http://host.docker.internal:3002
    routes:
      - name: org-routes
        paths:
          - /api/v1/org
        strip_path: false
    plugins:
      - name: jwt

  # ── user-service: avatares estáticos (sin JWT) ─────────────────────────
  - name: user-avatars
    url: http://host.docker.internal:3001
    routes:
      - name: user-avatars-route
        paths:
          - /uploads/avatars
        methods: [GET]
        strip_path: false

  # ── user-service: rutas PÚBLICAS (sin JWT) ─────────────────────────────
  - name: user-service-public
    url: http://host.docker.internal:3001
    routes:
      - name: complete-registration
        paths:
          - /api/v1/users/complete-registration
        methods: [POST]
        strip_path: false

  # ── user-service (con JWT) ─────────────────────────────────────────────
  - name: user-service
    url: http://host.docker.internal:3001
    routes:
      - name: user-routes
        paths:
          - /api/v1/users
          - /api/v1/roles
          - ~/api/v1/permissions$
        strip_path: false
    plugins:
      - name: jwt

  # ── document-service (con JWT) ─────────────────────────────────────────
  - name: document-service
    url: http://host.docker.internal:3003
    routes:
      - name: document-routes
        paths:
          - /api/v1/documents
        strip_path: false
    plugins:
      - name: jwt

  # ── workflow-service (con JWT) ─────────────────────────────────────────
  - name: workflow-service
    url: http://host.docker.internal:3005
    routes:
      - name: workflow-routes
        paths:
          - /api/v1/workflows
        strip_path: false
    plugins:
      - name: jwt

  # ── notification-service: ticket efímero para SSE (JWT en header) ──────
  # El cliente obtiene un ticket de corta vida (30s, un solo uso) antes de
  # abrir la conexión SSE. Así el JWT completo nunca aparece en la URL ni
  # en los logs de acceso de Kong/proxies.
  - name: notification-sse-ticket
    url: http://host.docker.internal:3006
    routes:
      - name: notification-sse-ticket-route
        paths:
          - /api/v1/notifications/stream/ticket
        methods: [POST]
        strip_path: false
    plugins:
      - name: jwt

  # ── notification-service: SSE stream (autenticado por ticket efímero) ──
  # EventSource no puede enviar headers; el ticket de corta vida reemplaza
  # al JWT en la query string para no exponer credenciales en logs/URLs.
  - name: notification-sse
    url: http://host.docker.internal:3006
    routes:
      - name: notification-sse-route
        paths:
          - /api/v1/notifications/stream
        methods: [GET]
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 30
          policy: local
          fault_tolerant: true

  # ── notification-service: resto de rutas (JWT en header) ───────────────
  - name: notification-service
    url: http://host.docker.internal:3006
    routes:
      - name: notification-routes
        paths:
          - /api/v1/notifications
        strip_path: false
    plugins:
      - name: jwt

  # ── audit-service: Swagger docs (sin JWT) ──────────────────────────────
  - name: audit-docs
    url: http://host.docker.internal:3007
    routes:
      - name: audit-docs-route
        paths:
          - /api/v1/audit/docs
        strip_path: false

  # ── audit-service (con JWT) ─────────────────────────────────────────────
  - name: audit-service
    url: http://host.docker.internal:3007
    routes:
      - name: audit-routes
        paths:
          - /api/v1/audit
        strip_path: false
    plugins:
      - name: jwt

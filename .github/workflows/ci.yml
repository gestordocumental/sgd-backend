name: CI — Build & Validate

# Corre en cada push y en PRs hacia test y master.
# Valida que todos los servicios compilan correctamente antes de que
# Railway intente desplegar.
#
# Ramas del proyecto:
#   dev    → entorno Railway: develop
#   test   → entorno Railway: staging
#   master → entorno Railway: production

on:
  push:
    branches: [dev, test, master]
  pull_request:
    branches: [dev, test, master]

jobs:
  # ── Tests unitarios por servicio ─────────────────────────────────────────
  test-services:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false          # Si falla uno, los otros siguen corriendo
      matrix:
        service:
          - auth-service
          - user-service
          - org-service
          - document-service
          - metadata-extractor-service
          - workflow-service
          # Agregar aquí cuando el servicio tenga tests:
          # - notification-service
          # - audit-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Instalar dependencias
        working-directory: services/${{ matrix.service }}
        run: npm ci

      - name: Ejecutar tests con cobertura (mínimo 85%)
        working-directory: services/${{ matrix.service }}
        # test:cov ejecuta jest --coverage y falla si coverageThreshold no se cumple.
        # --if-present: exit 0 si el script no está definido (servicios sin tests aún).
        run: npm run test:cov --if-present

  # ── Validar que cada Dockerfile compila sin errores ─────────────────────
  build-services:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false          # Si falla uno, los otros siguen corriendo
      matrix:
        service:
          - auth-service
          - user-service
          - org-service
          - document-service
          - metadata-extractor-service
          - workflow-service
          # Agregar aquí cuando se creen los demás servicios:
          # - notification-service
          # - audit-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: npm ci

      - name: TypeScript compile check
        working-directory: services/${{ matrix.service }}
        run: npm run build

      - name: Docker build check
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: false           # Solo valida que la imagen construye, no la sube

  # ── Validar que el Dockerfile de Kong (Railway) compila ─────────────────
  build-api-gateway:
    name: Build API Gateway (Kong)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker build check
        uses: docker/build-push-action@v5
        with:
          context: railway/api-gateway
          push: false

  # ── Resumen de CI — requerido por branch protection rules ───────────────
  ci-success:
    name: CI OK
    runs-on: ubuntu-latest
    needs: [build-services, build-api-gateway, test-services]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.build-services.result }}"  != "success" || \
                "${{ needs.build-api-gateway.result }}" != "success" || \
                "${{ needs.test-services.result }}"   != "success" ]]; then
            echo "CI failed"
            exit 1
          fi
          echo "All CI checks passed"

version: 2

updates:
  # ── GitHub Actions ─────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["dependencies", "ci"]

  # ── Workspace root (eslint, typescript, etc.) ──────────────────────────────
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["dependencies"]
    ignore:
      # Major version bumps require manual validation
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ── @sgd/common ────────────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/packages/common"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["dependencies", "common"]

  # ── auth-service ────────────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/services/auth-service"
